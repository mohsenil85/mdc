<!DOCTYPE html>
<html lang="{{ .Site.Language.LanguageCode | default "en" }}">
<head>
  <meta charset="UTF-8">
  <title>{{ .Title }} | {{ .Site.Title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ .Description | default .Summary }}">
  <link rel="canonical" href="{{ .Permalink }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ .Title }} | {{ .Site.Title }}">
  <meta property="og:description" content="{{ .Description | default .Summary }}">
  <meta property="og:image" content="{{ .Site.BaseURL }}images/og-image.jpg">
  <meta property="og:type" content="article">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Karla:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">

  {{ partial "analytics.html" . }}
</head>
<body>
  <nav class="blog-nav">
    <div class="wrap blog-nav-inner">
      <a href="/" class="blog-home">&larr; Mountain Dreamer Counseling</a>
      <a href="/posts/" class="blog-journal-link">Dream Journal</a>
    </div>
  </nav>

  <main class="site-main">
    <article class="post wrap">
      <header class="post-header">
        <p class="eyebrow">Dream Journal</p>
        <h1>{{ .Title }}</h1>
        <p class="post-meta">
          {{ .Date.Format "January 2, 2006" }}{{ with .Params.author }} <span class="footer-sep">&middot;</span> {{ . }}{{ end }}
        </p>
      </header>

      <div class="post-body">
        {{ .Content }}
      </div>

      <footer class="post-footer">
        <a href="/posts/" class="btn btn-dawn">More from the Dream Journal</a>
      </footer>
    </article>
  </main>

  {{ partial "footer.html" . }}
</body>
</html>
