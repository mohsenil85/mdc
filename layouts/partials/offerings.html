{{ $offerings := .Site.GetPage "/sections/offerings" }}
{{ $wave := "M0,30 C240,54 480,10 720,30 C960,50 1200,58 1440,30 L1440,70 L0,70 Z" }}
{{ if $offerings }}
<section class="offerings">
  <svg class="wave wave--pine offerings-wave-top" viewBox="0 0 1440 70" preserveAspectRatio="none" aria-hidden="true"><path d="{{ $wave }}"/></svg>
  <div class="wrap offerings-inner">
    <div class="offerings-head">
      <p class="eyebrow">Areas of focus</p>
      <h2>{{ $offerings.Title }}</h2>
    </div>
    <div class="offerings-content">
      {{ $offerings.Content }}
    </div>
  </div>
  <svg class="wave wave--pine offerings-wave-bottom" viewBox="0 0 1440 70" preserveAspectRatio="none" aria-hidden="true"><path d="{{ $wave }}"/></svg>
</section>
{{ end }}
